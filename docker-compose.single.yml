# All-in-one local stack (same as docker-compose.yml; alias for handoff template)
services:
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - CORS_ORIGINS=http://localhost:3000
      - PUBLIC_WORKER_URL=http://localhost:3000/api
      - ARTIFACT_TTL_SECONDS=3600
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    environment:
      - API_PROXY_TARGET=http://worker:8080
    depends_on:
      worker:
        condition: service_healthy
